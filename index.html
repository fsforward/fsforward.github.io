<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" type="text/css" href="styles.css"> -->
    <title>fsForward</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* Hide scrollbars */
            background-image: url("/media/images/bg.png");
            /* Set background image */
            background-size: cover;
            /* Ensure background covers the entire viewport */
            background-position: center;
            /* Center the background image */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            /* Text color */
            font-family: Arial, sans-serif;
            /* Specify font family */
        }

        /* Apply the "480p" effect to all elements except the overlay */
        body>*:not(#gif-overlay) {
            filter: blur(1.5px);
        }

        #gif-overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            z-index: 9999;
            /* Ensure it's on top of everything */
            pointer-events: none;
            /* Allow interaction with elements behind */
        }

        #coming-soon-text,
        #horizontal-line,
        #countdown-text {
            filter: none;
            /* Remove the filter for these elements */
        }

        #coming-soon-text {
            font-size: 36px;
            /* Adjust font size */
            text-align: center;
        }

        #horizontal-line {
            width: 25%;
            /* Adjust line width */
            border-bottom: 1px solid white;
            /* Horizontal line style */
            margin: 20px 0;
            /* Adjust margin */
        }

        #countdown-text {
            font-size: 24px;
            /* Adjust font size */
            text-align: center;
        }

        /* Custom modal styles */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 9999; /* Ensure it's on top of everything */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5); /* Black background with transparency */
        }

        .modal-content {
            background-color: #333333;
            filter: opacity(75%);
            font-size: large;
            margin: 20% auto; /* Center modal vertically and horizontally */
            padding: 20px;
            border: 1px solid #888;
            width: 20%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        /* Close button style */
        .close {
            position: absolute;
            top: 8px;
            right: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="coming-soon-text">THANK YOU</div>
    <div id="horizontal-line"></div>
    <div id="countdown-text">see you soon</div>
    <img id="gif-overlay" src="/media/videos/GS.gif" alt="Overlay GIF">

    <!-- Modal -->
    <div id="myModal" class="modal">
        <!-- Modal content -->
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <p>There is nothing here.</p>
            <button onclick="playAudio()">Sure</button>
        </div>
    </div>

    <audio id="background-audio" loop>
        <source src="/media/audio/ambience.mp3" type="audio/mp3">
    </audio>

    <script>
        // Get the modal
        var modal = document.getElementById("myModal");

        // Function to display the modal
        function displayModal() {
            modal.style.display = "block";
        }

        // Function to close the modal
        function closeModal() {
            modal.style.display = "none";
        }

        // Function to play the audio
        function playAudio() {
            closeModal(); // Close the modal
            document.getElementById('background-audio').play(); // Play the audio
        }

        displayModal();
    </script>
</body>

</html>
