<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" type="text/css" href="styles.css"> -->
    <title>fsForward</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;

            /* Hide scrollbars */
            background-image: url("media/images/bg.jpg");
            /* Set background image */
            background-size: cover;
            /* Ensure background covers the entire viewport */
            background-position: center;
            /* Center the background image */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            /* Text color */
            font-family: Arial, sans-serif;
            /* Specify font family */
        }

        /* Apply the "480p" effect to all elements except the overlay */
        /* body>*:not(#gif-overlay) {
            filter: blur(2px);
        } */

        #gif-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            /* Ensure it's on top of everything */
            pointer-events: none;
            /* Allow interaction with elements behind */
        }

        #coming-soon-text,
        #horizontal-line,
        #countdown-text {
            filter: none;
            /* Remove the filter for these elements */
        }

        #coming-soon-text {
            font-size: 36px;
            /* Adjust font size */
            text-align: center;
        }

        #horizontal-line {
            width: 25%;
            /* Adjust line width */
            border-bottom: 1px solid white;
            /* Horizontal line style */
            margin: 20px 0;
            /* Adjust margin */
        }

        #countdown-text {
            font-size: 24px;
            /* Adjust font size */
            text-align: center;
        }
    </style>
</head>

<body>
    <audio id="background-audio" autoplay loop>
        <source src="media/audio/ambience.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <div id="coming-soon-text">THANK YOU</div>
    <div id="horizontal-line"></div>
    <div id="countdown-text">see you soon</div>
    <!-- <img id="gif-overlay" src="media/videos/GS.gif" alt="Overlay GIF"> -->
</body>

</html>
