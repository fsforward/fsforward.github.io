<!DOCTYPE html>
<html>

<head>
  <title>Access Denied</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: linear-gradient(135deg, #ff7eb6, #ff73a4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    h1 {
      color: #fff;
      font-size: 48px;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .denied-container {
      max-width: 600px;
      text-align: center;
      margin: 0 auto;
    }

    .denied-container p {
      color: #fff;
      font-size: 24px;
      margin-top: 20px;
      width: 80%;
      margin: 0 auto;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    .debug-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      background-color: #ff348b;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: background-color 0.3s ease-in-out;
    }

    .debug-button:hover {
      background-color: #ff4b9e;
    }

    .password-input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      margin-top: 20px;
      text-align: center;
      color: #666;
      box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.3);
      transition: box-shadow 0.3s ease-in-out;
    }

    .password-input::placeholder {
      color: #999;
    }

    .password-input:focus {
      outline: none;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>

<body>
  <div class="denied-container">
    <h1>Access Denied</h1>
    <p>
      You currently do not have access to this website on your device. Please ensure that you are using a desktop device
      to access this site. Our website is specifically designed and optimized for desktop devices only. We apologize for
      any inconvenience this may cause.
    </p>
    <input type="password" id="passwordInput" class="password-input" placeholder="Debug Password">
    <button class="debug-button" onclick="checkPassword()">Debug</button>
  </div>
  <script src="app.js"></script>
  <script>
    function checkPassword() {
      var password = document.getElementById('passwordInput').value;
      if (password === 'fs#303') {
        redirectToIndex();
      } else {
        alert('Incorrect password. Please try again.');
      }
    }

    function redirectToIndex() {
      var currentUrl = window.location.href;
      if (currentUrl.includes('debug-mode')) {
        window.location.href = 'index.html';
      } else {
        window.location.href = 'index.html?debug-mode';
      }
    }
  </script>
</body>

</html>
